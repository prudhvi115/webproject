{% extends 'base.html' %}

{% block content %}
<div style="display: flex; height: 80vh; gap: 1rem;">
    <!-- Chat Section -->
    <div class="glass-panel" style="flex: 1; display: flex; flex-direction: column;">
        <h3>Chat: {{ room.name }}</h3>
        <div id="chat-messages"
            style="flex: 1; overflow-y: auto; padding: 1rem; background: rgba(0,0,0,0.2); border-radius: 10px; margin-bottom: 1rem;">
            <!-- Messages will be loaded here -->
        </div>
        <div style="display: flex; gap: 0.5rem;">
            <input type="text" id="message-input" placeholder="Type a message..." style="flex: 1; margin-bottom: 0;">
            <button id="send-btn" class="btn-primary">Send</button>
        </div>
    </div>

    <!-- Video/Screen Share Placeholder -->
    <div class="glass-panel" style="width: 300px; display: flex; flex-direction: column; gap: 1rem;">
        <h3>Video Collaboration</h3>
        <div
            style="background: black; height: 200px; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #555;">
            Webcam Placeholder
        </div>
        <button class="btn-glow" onclick="alert('Starting video call (simulated)...')">Start Video</button>
        <button class="btn-glow" onclick="alert('Sharing screen (simulated)...')">Share Screen</button>

        <h4>Online Members (Simulated)</h4>
        <ul style="list-style: none; padding: 0;">
            {% for member in group.members.all %}
            <li style="padding: 0.5rem; border-bottom: 1px solid rgba(255,255,255,0.1);">{{ member.username }}</li>
            {% endfor %}
        </ul>
    </div>
</div>

<script>
    const roomId = {{ room.id }};
    const chatContainer = document.getElementById('chat-messages');
    const msgInput = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');
    let lastId = 0;

    function fetchMessages() {
        const url = "{% url 'get_messages' 0 %}".replace('0', roomId);
        fetch(url + `?last_id=${lastId}`)
            .then(response => response.json())
            .then(data => {
                if (data.messages && data.messages.length > 0) {
                    data.messages.forEach(msg => {
                        const div = document.createElement('div');
                        div.style.marginBottom = '0.5rem';
                        div.innerHTML = `<strong>${msg.sender}</strong> <span style="font-size: 0.8em; color: gray;">${msg.timestamp}</span><br>${msg.content}`;
                        chatContainer.appendChild(div);
                        lastId = msg.id;
                    });
                    chatContainer.scrollTop = chatContainer.scrollHeight;
                }
            });
    }

    sendBtn.addEventListener('click', () => {
        const content = msgInput.value.trim();
        if (!content) return;

        const url = "{% url 'send_message' 0 %}".replace('0', roomId);
        fetch(url, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': '{{ csrf_token }}'
            },
            body: JSON.stringify({ content: content })
        }).then(res => {
            if (res.ok) {
                msgInput.value = '';
                fetchMessages(); // Refresh immediately
            }
        });
    });

    // Poll every 3 seconds
    setInterval(fetchMessages, 3000);
    fetchMessages(); // Initial load
</script>
{% endblock %}
